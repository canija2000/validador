  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

01\", \"cv11\";\n  }\n  .page {\n    max-width: 1500px;\n    margin: 0 auto;\n    padding: 40px 48px 80px;\n  }\n  @media (max-width: 1280px) { .page { padding: 32px 32px 64px; } }\n  @media (max-width: 760px)  { .page { padding: 24px 20px 48px; } }\n  /* ───────── Header ───────── */\n  .topbar {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    padding-bottom: 18px;\n    border-bottom: 1px solid var(--rule);\n    margin-bottom: 36px;\n  }\n  .crumb {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n  }\n  .crumb b { color: var(--ink); font-weight: 600; }\n  .title {\n    font-family: 'Fraunces', serif;\n    font-weight: 500;\n    font-size: 56px;\n    line-height: 1;\n    letter-spacing: -0.02em;\n    margin: 0 0 10px;\n  }\n  .title em {\n    font-style: italic;\n    font-weight: 400;\n    color: var(--accent);\n  }\n  .subtitle {\n    font-size: 15px;\n    color: var(--ink-soft);\n    max-width: 640px;\n    line-height: 1.5;\n    margin: 0;\n  }\n  .header-row {\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-end;\n    gap: 40px;\n    margin-bottom: 40px;\n  }\n  .legend {\n    display: flex;\n    gap: 18px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    color: var(--ink-mute);\n    align-items: center;\n  }\n  .legend .dot {\n    display: inline-block; width: 9px; height: 9px; border-radius: 50%;\n    vertical-align: middle; margin-right: 6px;\n  }\n  .legend .dot.active { background: var(--accent); }\n  .legend .dot.yes    { background: var(--yes); }\n  .legend .dot.no     { background: var(--no); }\n  .legend .dot.idle   { background: var(--rule); }\n\n  /* ───────── Grid ───────── */\n  .grid {\n    display: grid;\n    grid-template-columns: 300px minmax(0, 1fr) 420px;\n    grid-template-areas: \"controls flow code\";\n    gap: 24px;\n    align-items: start;\n  }\n  .grid > :nth-child(1) { grid-area: controls; }\n  .grid > :nth-child(2) { grid-area: flow; }\n  .grid > :nth-child(3) { grid-area: code; }\n\n  @media (max-width: 1280px) {\n    .grid {\n      grid-template-columns: 280px minmax(0, 1fr);\n      grid-template-areas:\n        \"controls flow\"\n        \"code     code\";\n    }\n    .code-card { position: static; }\n    .code-block { max-height: 520px; }\n  }\n  @media (max-width: 760px) {\n    .grid {\n      grid-template-columns: 1fr;\n      grid-template-areas:\n        \"controls\"\n        \"flow\"\n        \"code\";\n    }\n    .header-row { flex-direction: column; align-items: flex-start; }\n    .title { font-size: 40px; }\n  }\n\n  /* ───────── Cards ───────── */\n  .card {\n    background: var(--bg-card);\n    border: 1px solid var(--rule);\n    border-radius: 14px;\n    padding: 22px;\n  }\n  .card-label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n    margin-bottom: 14px;\n  }\n  .card h3 {\n    font-family: 'Fraunces', serif;\n    font-weight: 500;\n    font-size: 22px;\n    margin: 0 0 14px;\n    letter-spacing: -0.01em;\n  }\n\n  /* ───────── Input panel ───────── */\n  .input-row {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1.2fr;\n    gap: 8px;\n    margin-bottom: 16px;\n  }\n  .input-field {\n    display: flex;\n    flex-direction: column;\n    gap: 6px;\n  }\n  .input-field label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: var(--ink-mute);\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n  }\n  .input-field input {\n    border: 1px solid var(--rule);\n    background: var(--bg-card);\n    border-radius: 8px;\n    padding: 10px 12px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 18px;\n    color: var(--ink);\n    width: 100%;\n    transition: border-color .15s;\n  }\n  .input-field input:focus {\n    outline: none;\n    border-color: var(--accent);\n  }\n  .btn-row {\n    display: flex; gap: 8px; margin-top: 4px;\n  }\n  .btn {\n    flex: 1;\n    font-family: 'Geist', sans-serif;\n    font-weight: 500;\n    font-size: 14px;\n    padding: 12px 14px;\n    border-radius: 8px;\n    border: 1px solid var(--ink);\n    background: var(--ink);\n    color: var(--bg-card);\n    cursor: pointer;\n    transition: transform .1s, opacity .15s;\n  }\n  .btn:hover { transform: translateY(-1px); }\n  .btn:active { transform: translateY(0); }\n  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }\n  .btn.ghost {\n    background: transparent; color: var(--ink);\n    border: 1px solid var(--rule);\n  }\n  .examples {\n    margin-top: 16px;\n    padding-top: 16px;\n    border-top: 1px dashed var(--rule);\n  }\n  .ex-label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n    margin-bottom: 8px;\n  }\n  .ex-list {\n    display: flex; flex-wrap: wrap; gap: 6px;\n  }\n  .chip {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 12px;\n    padding: 5px 9px;\n    border-radius: 6px;\n    background: var(--bg-sunk);\n    border: 1px solid var(--rule-soft);\n    cursor: pointer;\n    color: var(--ink-soft);\n    transition: background .15s, color .15s;\n  }\n  .chip:hover { background: var(--accent-soft); color: var(--accent); }\n\n  /* ───────── Variables ───────── */\n  .vars { margin-top: 22px; }\n  .var-row {\n    display: flex; justify-content: space-between; align-items: center;\n    padding: 10px 0;\n    border-bottom: 1px dashed var(--rule);\n  }\n  .var-row:last-child { border-bottom: none; }\n  .var-name {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 13px;\n    color: var(--ink-soft);\n  }\n  .var-val {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 13px;\n    font-weight: 600;\n    padding: 3px 9px;\n    border-radius: 5px;\n    background: var(--bg-sunk);\n    color: var(--ink-mute);\n    transition: all .25s;\n  }\n  .var-val.true  { background: var(--yes-soft); color: var(--yes); }\n  .var-val.false { background: var(--no-soft);  color: var(--no);  }\n  .var-val.pulse { animation: pulse .5s ease; }\n  @keyframes pulse {\n    0%   { transform: scale(1); }\n    50%  { transform: scale(1.15); }\n    100% { transform: scale(1); }\n  }\n\n  /* ───────── Flow ───────── */\n  .flow {\n    background: var(--bg-card);\n    border: 1px solid var(--rule);\n    border-radius: 14px;\n    padding: 28px 28px 32px;\n    position: relative;\n  }\n  .flow-grid {\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n  }\n  .node {\n    background: var(--bg-card);\n    border: 1.5px solid var(--rule);\n    border-radius: 10px;\n    padding: 14px 18px;\n    transition: all .35s cubic-bezier(.2,.7,.3,1);\n    position: relative;\n  }\n  .node.active {\n    border-color: var(--accent);\n    background: var(--accent-soft);\n    box-shadow: 0 0 0 4px color-mix(in oklch, var(--accent) 12%, transparent);\n  }\n  .node.passed.yes {\n    border-color: var(--yes);\n    background: var(--yes-soft);\n  }\n  .node.passed.no {\n    border-color: var(--no);\n    background: var(--no-soft);\n  }\n  .node.skipped { opacity: 0.35; }\n  .node-head {\n    display: flex; align-items: center; gap: 12px;\n    margin-bottom: 6px;\n  }\n  .node-num {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    width: 22px; height: 22px;\n    border-radius: 50%;\n    background: var(--bg-sunk);\n    color: var(--ink-mute);\n    display: flex; align-items: center; justify-content: center;\n    font-weight: 600;\n    flex-shrink: 0;\n    transition: all .25s;\n  }\n  .node.active .node-num { background: var(--accent); color: white; }\n  .node.passed.yes .node-num { background: var(--yes); color: white; }\n  .node.passed.no  .node-num { background: var(--no);  color: white; }\n  .node-title {\n    font-family: 'Fraunces', serif;\n    font-weight: 500;\n    font-size: 19px;\n    letter-spacing: -0.01em;\n    color: var(--ink);\n  }\n  .node-desc {\n    font-size: 13px;\n    color: var(--ink-soft);\n    margin-left: 34px;\n    line-height: 1.5;\n  }\n  .node-detail {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 12px;\n    margin-top: 8px;\n    margin-left: 34px;\n    padding: 8px 10px;\n    background: rgba(0,0,0,.04);\n    border-radius: 6px;\n    display: none;\n    color: var(--ink-soft);\n  }\n  .node.active .node-detail,\n  .node.passed .node-detail { display: block; }\n\n  /* Connector */\n  .connector {\n    margin-left: 28px;\n    height: 12px;\n    border-left: 2px dashed var(--rule);\n    width: 2px;\n  }\n  .connector.live { border-left-color: var(--accent); }\n  .connector.yes  { border-left-color: var(--yes); border-left-style: solid; }\n  .connector.no   { border-left-color: var(--no);  border-left-style: solid; }\n\n  /* Branch — month-of-day check */\n  .branch {\n    margin-top: 6px;\n    margin-left: 34px;\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 8px;\n  }\n  .branch-cell {\n    border: 1px solid var(--rule);\n    border-radius: 8px;\n    padding: 10px 12px;\n    background: var(--bg-card);\n    transition: all .3s;\n  }\n  .branch-cell .bc-head {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n    margin-bottom: 3px;\n  }\n  .branch-cell .bc-body {\n    font-family: 'Geist', sans-serif;\n    font-size: 12px;\n    color: var(--ink-soft);\n    line-height: 1.4;\n  }\n  .branch-cell.active {\n    border-color: var(--accent);\n    background: var(--accent-soft);\n  }\n  .branch-cell.dim { opacity: 0.4; }\n\n  /* Verdict */\n  .verdict {\n    margin-top: 20px;\n    border-radius: 12px;\n    padding: 24px 28px;\n    border: 1.5px solid var(--rule);\n    background: var(--bg-sunk);\n    display: flex; align-items: center; justify-content: space-between;\n    gap: 20px;\n    transition: all .4s;\n  }\n  .verdict.yes { background: var(--yes-soft); border-color: var(--yes); }\n  .verdict.no  { background: var(--no-soft);  border-color: var(--no);  }\n  .verdict-label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n    margin-bottom: 4px;\n  }\n  .verdict-text {\n    font-family: 'Fraunces', serif;\n    font-weight: 500;\n    font-size: 28px;\n    letter-spacing: -0.01em;\n  }\n  .verdict-icon {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 48px;\n    font-weight: 500;\n    line-height: 1;\n    color: var(--ink-mute);\n  }\n  .verdict.yes .verdict-icon { color: var(--yes); }\n  .verdict.no  .verdict-icon { color: var(--no);  }\n\n  /* Step counter */\n  .stepbar {\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 0 4px 18px;\n    border-bottom: 1px dashed var(--rule);\n    margin-bottom: 22px;\n  }\n  .step-info {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    color: var(--ink-mute);\n    letter-spacing: 0.06em;\n  }\n  .step-info b { color: var(--ink); font-weight: 600; }\n  .step-controls { display: flex; gap: 6px; }\n  .icon-btn {\n    width: 32px; height: 32px;\n    border-radius: 8px;\n    border: 1px solid var(--rule);\n    background: var(--bg-card);\n    cursor: pointer;\n    display: flex; align-items: center; justify-content: center;\n    color: var(--ink-soft);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 14px;\n    transition: all .15s;\n  }\n  .icon-btn:hover:not(:disabled) { border-color: var(--ink); color: var(--ink); }\n  .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }\n\n  /* Bottom note */\n  .footnote {\n    margin-top: 28px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    color: var(--ink-mute);\n    letter-spacing: 0.04em;\n    text-align: center;\n  }\n  .footnote b { color: var(--ink-soft); }\n\n  /* ───────── Code panel ───────── */\n  .code-card {\n    padding: 0;\n    overflow: hidden;\n    position: sticky;\n    top: 20px;\n  }\n  .code-head {\n    padding: 18px 20px 14px;\n    border-bottom: 1px solid var(--rule-soft);\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n  }\n  .code-head .card-label { margin: 0; }\n  .code-step-tag {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n    padding: 3px 8px;\n    border-radius: 5px;\n    background: var(--bg-sunk);\n  }\n  .code-step-tag.live {\n    color: var(--accent);\n    background: var(--accent-soft);\n  }\n  .code-block {\n    margin: 0;\n    padding: 10px 0;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 12.5px;\n    line-height: 1.7;\n    color: var(--ink);\n    background: var(--bg-card);\n    max-height: 680px;\n    overflow-y: auto;\n    scroll-behavior: smooth;\n  }\n  .code-block::-webkit-scrollbar { width: 6px; }\n  .code-block::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }\n  .cl {\n    display: flex;\n    padding: 0 14px 0 0;\n    border-left: 3px solid transparent;\n    transition: background .25s, border-color .25s, opacity .25s;\n    white-space: pre;\n  }\n  .cl .ln {\n    flex-shrink: 0;\n    width: 38px;\n    text-align: right;\n    padding-right: 14px;\n    color: var(--ink-mute);\n    opacity: 0.45;\n    user-select: none;\n    font-size: 10.5px;\n    line-height: inherit;\n  }\n  .cl.c-line { color: var(--ink-mute); font-style: italic; }\n  .cl.c-line .ln { opacity: 0.3; }\n  .cl.passed-step {\n    background: rgba(0,0,0,.02);\n    border-left-color: color-mix(in oklch, var(--ink-mute) 30%, transparent);\n  }\n  .cl.active-step {\n    background: var(--accent-soft);\n    border-left-color: var(--accent);\n  }\n  .cl.active-step.failed {\n    background: var(--no-soft);\n    border-left-color: var(--no);\n  }\n  .cl.dim { opacity: 0.35; }\n  .tok-k { color: oklch(48% 0.13 280); font-weight: 500; }   /* keywords */\n  .tok-s { color: oklch(48% 0.10 30); }                       /* strings */\n  .tok-n { color: oklch(48% 0.12 220); }                      /* numbers */\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"page\">\n\n  <div class=\"topbar\">\n    <div class=\"crumb\">Clase de Programación · <b>Estructuras Condicionales<\u002Fb><\u002Fdiv>\n    <div class=\"crumb\">ejercicio 04 · validación de fechas<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"header-row\">\n    <div>\n      <h1 class=\"title\">¿Existe <em>la fecha<\u002Fem>?<\u002Fh1>\n      <p class=\"subtitle\">Una visualización paso a paso del algoritmo. Ingresa un día, mes y año, y observa cómo el programa toma cada decisión antes de declarar la fecha válida o inválida.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"legend\">\n      <span><span class=\"dot idle\"><\u002Fspan>pendiente<\u002Fspan>\n      <span><span class=\"dot active\"><\u002Fspan>evaluando<\u002Fspan>\n      <span><span class=\"dot yes\"><\u002Fspan>aprobado<\u002Fspan>\n      <span><span class=\"dot no\"><\u002Fspan>falla<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"grid\">\n\n    <!-- LEFT COLUMN ────────────────────── -->\n    <div>\n      <div class=\"card\">\n        <div class=\"card-label\">Entrada<\u002Fdiv>\n        <div class=\"input-row\">\n          <div class=\"input-field\">\n            <label>día<\u002Flabel>\n            <input id=\"in-dia\" type=\"number\" value=\"29\" min=\"1\" max=\"31\">\n          <\u002Fdiv>\n          <div class=\"input-field\">\n            <label>mes<\u002Flabel>\n            <input id=\"in-mes\" type=\"number\" value=\"2\" min=\"1\" max=\"12\">\n          <\u002Fdiv>\n          <div class=\"input-field\">\n            <label>año<\u002Flabel>\n            <input id=\"in-anio\" type=\"number\" value=\"2024\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"btn-row\">\n          <button class=\"btn\" id=\"btn-run\">Validar paso a paso<\u002Fbutton>\n          <button class=\"btn ghost\" id=\"btn-reset\">↺<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"examples\">\n          <div class=\"ex-label\">prueba estos casos<\u002Fdiv>\n          <div class=\"ex-list\" id=\"examples\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card vars\">\n        <div class=\"card-label\">Variables en memoria<\u002Fdiv>\n        <div class=\"var-row\">\n          <span class=\"var-name\">dia<\u002Fspan>\n          <span class=\"var-val\" id=\"v-dia\">—<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"var-row\">\n          <span class=\"var-name\">mes<\u002Fspan>\n          <span class=\"var-val\" id=\"v-mes\">—<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"var-row\">\n          <span class=\"var-name\">anio<\u002Fspan>\n          <span class=\"var-val\" id=\"v-anio\">—<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"var-row\">\n          <span class=\"var-name\">es_bisiesto<\u002Fspan>\n          <span class=\"var-val\" id=\"v-bis\">—<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"var-row\">\n          <span class=\"var-name\">fecha_valida<\u002Fspan>\n          <span class=\"var-val\" id=\"v-val\">—<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- RIGHT COLUMN ────────────────────── -->\n    <div class=\"flow\">\n      <div class=\"stepbar\">\n        <div class=\"step-info\">Paso <b id=\"step-cur\">0<\u002Fb> de <b>5<\u002Fb> · <span id=\"step-name\">esperando entrada<\u002Fspan><\u002Fdiv>\n        <div class=\"step-controls\">\n          <button class=\"icon-btn\" id=\"step-prev\" title=\"Anterior\">←<\u002Fbutton>\n          <button class=\"icon-btn\" id=\"step-next\" title=\"Siguiente\">→<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"flow-grid\">\n\n        <!-- Step 1 -->\n        <div class=\"node\" data-step=\"1\">\n          <div class=\"node-head\">\n            <div class=\"node-num\">1<\u002Fdiv>\n            <div class=\"node-title\">¿Día y mes en rango básico?<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"node-desc\">Comprobamos que el día esté entre 1–31 y el mes entre 1–12. Es el filtro más amplio antes de mirar el calendario real.<\u002Fdiv>\n          <div class=\"node-detail\" id=\"d1\">dia ∈ [1, 31] &nbsp;∧&nbsp; mes ∈ [1, 12]<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"connector\" id=\"c1\"><\u002Fdiv>\n\n        <!-- Step 2 -->\n        <div class=\"node\" data-step=\"2\">\n          <div class=\"node-head\">\n            <div class=\"node-num\">2<\u002Fdiv>\n            <div class=\"node-title\">¿El año es bisiesto?<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"node-desc\">Un año es bisiesto si es divisible por 400, o bien por 4 pero no por 100. Esto solo afecta a febrero, pero lo calculamos antes para tenerlo listo.<\u002Fdiv>\n          <div class=\"node-detail\" id=\"d2\">(anio % 400 == 0) ∨ (anio % 4 == 0 ∧ anio % 100 ≠ 0)<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"connector\" id=\"c2\"><\u002Fdiv>\n\n        <!-- Step 3 -->\n        <div class=\"node\" data-step=\"3\">\n          <div class=\"node-head\">\n            <div class=\"node-num\">3<\u002Fdiv>\n            <div class=\"node-title\">¿Qué tipo de mes es?<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"node-desc\">Según el mes ingresado, tomamos uno de tres caminos. Cada uno tiene un límite distinto de días.<\u002Fdiv>\n          <div class=\"branch\">\n            <div class=\"branch-cell\" data-branch=\"31\">\n              <div class=\"bc-head\">31 días<\u002Fdiv>\n              <div class=\"bc-body\">Ene · Mar · May · Jul · Ago · Oct · Dic<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"branch-cell\" data-branch=\"30\">\n              <div class=\"bc-head\">30 días<\u002Fdiv>\n              <div class=\"bc-body\">Abr · Jun · Sep · Nov<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"branch-cell\" data-branch=\"feb\">\n              <div class=\"bc-head\">Febrero<\u002Fdiv>\n              <div class=\"bc-body\">28 o 29 según bisiesto<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"connector\" id=\"c3\"><\u002Fdiv>\n\n        <!-- Step 4 -->\n        <div class=\"node\" data-step=\"4\">\n          <div class=\"node-head\">\n            <div class=\"node-num\">4<\u002Fdiv>\n            <div class=\"node-title\">¿El día cabe en ese mes?<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"node-desc\">Comparamos el día con el máximo permitido por el camino elegido. Si se pasa, marcamos la fecha como inválida.<\u002Fdiv>\n          <div class=\"node-detail\" id=\"d4\">dia ≤ máximo_del_mes<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"connector\" id=\"c4\"><\u002Fdiv>\n\n        <!-- Step 5 -->\n        <div class=\"node\" data-step=\"5\">\n          <div class=\"node-head\">\n            <div class=\"node-num\">5<\u002Fdiv>\n            <div class=\"node-title\">Veredicto<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"node-desc\">Si <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">fecha_valida<\u002Fcode> sigue en <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">True<\u002Fcode>, la fecha existe. Si en algún paso se puso en <code style=\"font-family:'JetBrains Mono',monospace;font-size:12px\">False<\u002Fcode>, no existe.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Verdict -->\n        <div class=\"verdict\" id=\"verdict\">\n          <div>\n            <div class=\"verdict-label\">Resultado<\u002Fdiv>\n            <div class=\"verdict-text\" id=\"verdict-text\">— ingresa una fecha y pulsa validar —<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"verdict-icon\" id=\"verdict-icon\">·<\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CODE COLUMN ──────────────────── -->\n    <div>\n      <div class=\"card code-card\">\n        <div class=\"code-head\">\n          <div class=\"card-label\">Código fuente<\u002Fdiv>\n          <div class=\"code-step-tag\" id=\"code-step-tag\">en espera<\u002Fdiv>\n        <\u002Fdiv>\n        <pre class=\"code-block\" id=\"code-block\"><\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"footnote\">Cada paso refleja un bloque del código original. <b>Observa cómo `fecha_valida` actúa como una \"bandera\" que solo puede pasar de True a False.<\u002Fb><\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\n  // ─── State ──────────────────────────\n  const state = {\n    dia: 29, mes: 2, anio: 2024,\n    step: 0,             // 0 = idle, 1..5 = evaluated up to that step\n    es_bisiesto: null,\n    fecha_valida: null,\n    failure: null,       // which step failed (if any)\n    branch: null,        // '31' | '30' | 'feb' | null\n    maxDay: null,\n  };\n\n  const $ = (id) => document.getElementById(id);\n\n  // ─── Source code, line by line ──────\n  // step: which algorithm step this line belongs to (1..5)\n  // branch: '31' | '30' | 'feb' — only highlight when that branch is taken\n  // c: true — comment line\n  // h: pre-tokenized HTML (replaces raw text)\n  const k = (s) => `<span class=\"tok-k\">${s}<\u002Fspan>`;\n  const num = (s) => `<span class=\"tok-n\">${s}<\u002Fspan>`;\n  const str = (s) => `<span class=\"tok-s\">${s}<\u002Fspan>`;\n\n  const CODE = [\n    { t: '# 4. ¿EXISTE LA FECHA?', c: true },\n    { t: '' },\n    { t: '# Pedimos los datos al usuario', c: true },\n    { h: `dia  = ${k('int')}(${k('input')}(${str('\"Ingrese el dia: \"')}))` },\n    { h: `mes  = ${k('int')}(${k('input')}(${str('\"Ingrese el mes: \"')}))` },\n    { h: `anio = ${k('int')}(${k('input')}(${str('\"Ingrese el año: \"')}))` },\n    { t: '' },\n    { h: `fecha_valida = ${k('True')}` },\n    { t: '' },\n    { t: '# Verificaciones básicas de rango', c: true },\n    { h: `${k('if')} dia &gt; ${num(31)} ${k('or')} dia &lt; ${num(1)}:`, step: 1 },\n    { h: `    fecha_valida = ${k('False')}`,                              step: 1 },\n    { t: '' },\n    { h: `${k('if')} mes &gt; ${num(12)} ${k('or')} mes &lt; ${num(1)}:`, step: 1 },\n    { h: `    fecha_valida = ${k('False')}`,                              step: 1 },\n    { t: '' },\n    { t: '# ¿Es bisiesto el año?', c: true },\n    { h: `es_bisiesto = ${k('False')}`,                                                                            step: 2 },\n    { h: `${k('if')} (anio % ${num(400)} == ${num(0)}) ${k('or')} (anio % ${num(4)} == ${num(0)} ${k('and')} anio % ${num(100)} != ${num(0)}):`, step: 2 },\n    { h: `    es_bisiesto = ${k('True')}`,                                                                          step: 2 },\n    { t: '' },\n    { t: '# Meses de 31 días', c: true },\n    { h: `${k('if')} mes == ${num(1)} ${k('or')} mes == ${num(3)} ${k('or')} ... ${k('or')} mes == ${num(12)}:`,    step: 3, branch: '31' },\n    { h: `    ${k('if')} dia &gt; ${num(31)}:`,                                                                     step: 4, branch: '31' },\n    { h: `        fecha_valida = ${k('False')}`,                                                                    step: 4, branch: '31' },\n    { t: '' },\n    { t: '# Meses de 30 días', c: true },\n    { h: `${k('elif')} mes == ${num(4)} ${k('or')} mes == ${num(6)} ${k('or')} mes == ${num(9)} ${k('or')} mes == ${num(11)}:`, step: 3, branch: '30' },\n    { h: `    ${k('if')} dia &gt; ${num(30)}:`,                                                                     step: 4, branch: '30' },\n    { h: `        fecha_valida = ${k('False')}`,                                                                    step: 4, branch: '30' },\n    { t: '' },\n    { t: '# Febrero', c: true },\n    { h: `${k('elif')} mes == ${num(2)}:`,                                                                          step: 3, branch: 'feb' },\n    { h: `    ${k('if')} es_bisiesto == ${k('True')}:`,                                                             step: 4, branch: 'feb' },\n    { h: `        ${k('if')} dia &gt; ${num(29)}:`,                                                                 step: 4, branch: 'feb' },\n    { h: `            fecha_valida = ${k('False')}`,                                                                step: 4, branch: 'feb' },\n    { h: `    ${k('else')}:`,                                                                                       step: 4, branch: 'feb' },\n    { h: `        ${k('if')} dia &gt; ${num(28)}:`,                                                                 step: 4, branch: 'feb' },\n    { h: `            fecha_valida = ${k('False')}`,                                                                step: 4, branch: 'feb' },\n    { t: '' },\n    { t: '# Resultado final', c: true },\n    { h: `${k('if')} fecha_valida == ${k('True')}:`,                                                                step: 5 },\n    { h: `    ${k('print')}(${str('\"La fecha ingresada es válida\"')})`,                                            step: 5 },\n    { h: `${k('else')}:`,                                                                                            step: 5 },\n    { h: `    ${k('print')}(${str('\"La fecha ingresada no es válida\"')})`,                                         step: 5 },\n  ];\n\n  // Build code DOM once\n  (function buildCode(){\n    const host = $('code-block');\n    let frag = '';\n    CODE.forEach((row, i) => {\n      const isC = !!row.c;\n      const body = row.h || (row.t === '' ? '&nbsp;' : escapeHtml(row.t));\n      const attrs = [];\n      if (row.step)   attrs.push(`data-step=\"${row.step}\"`);\n      if (row.branch) attrs.push(`data-branch=\"${row.branch}\"`);\n      const cls = ['cl'];\n      if (isC) cls.push('c-line');\n      frag += `<div class=\"${cls.join(' ')}\" ${attrs.join(' ')}>` +\n              `<span class=\"ln\">${i+1}<\u002Fspan>` +\n              `<span class=\"code-text\">${body}<\u002Fspan>` +\n              `<\u002Fdiv>`;\n    });\n    host.innerHTML = frag;\n  })();\n\n  function escapeHtml(s){\n    return s.replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');\n  }\n\n  // ─── Examples ──────────────────────\n  const EXAMPLES = [\n    { label: '29/02/2024', d: 29, m: 2, a: 2024 },   // valid, leap\n    { label: '29/02/2023', d: 29, m: 2, a: 2023 },   // invalid, not leap\n    { label: '31/04/2025', d: 31, m: 4, a: 2025 },   // invalid, april has 30\n    { label: '31/12/1999', d: 31, m: 12, a: 1999 },  // valid\n    { label: '00/13/2020', d: 0,  m: 13, a: 2020 },  // invalid, ranges\n    { label: '29/02/2000', d: 29, m: 2, a: 2000 },   // valid, /400\n    { label: '29/02/1900', d: 29, m: 2, a: 1900 },   // invalid, /100 not /400\n  ];\n  const exHost = $('examples');\n  EXAMPLES.forEach(ex => {\n    const c = document.createElement('span');\n    c.className = 'chip';\n    c.textContent = ex.label;\n    c.onclick = () => {\n      $('in-dia').value = ex.d;\n      $('in-mes').value = ex.m;\n      $('in-anio').value = ex.a;\n      reset();\n    };\n    exHost.appendChild(c);\n  });\n\n  // ─── Compute the full evaluation ahead of time ──────────────────────\n  function compute(dia, mes, anio) {\n    const out = {\n      dia, mes, anio,\n      es_bisiesto: ((anio % 400 === 0) || (anio % 4 === 0 && anio % 100 !== 0)),\n      step1_ok: (dia >= 1 && dia <= 31 && mes >= 1 && mes <= 12),\n      branch: null,\n      maxDay: null,\n      step4_ok: null,\n      fecha_valida: true,\n    };\n    // step 1 result\n    if (!out.step1_ok) out.fecha_valida = false;\n\n    // step 3 branch (only if mes in range; otherwise pick by mes anyway)\n    if ([1,3,5,7,8,10,12].includes(mes)) { out.branch = '31'; out.maxDay = 31; }\n    else if ([4,6,9,11].includes(mes))   { out.branch = '30'; out.maxDay = 30; }\n    else if (mes === 2)                  { out.branch = 'feb'; out.maxDay = out.es_bisiesto ? 29 : 28; }\n    else                                  { out.branch = null; out.maxDay = null; }\n\n    // step 4\n    if (out.maxDay !== null) {\n      out.step4_ok = (dia <= out.maxDay && dia >= 1);\n      if (!out.step4_ok) out.fecha_valida = false;\n    }\n    return out;\n  }\n\n  // ─── Render ──────────────────────\n  function setVar(id, val, cls) {\n    const el = $(id);\n    el.textContent = val;\n    el.className = 'var-val ' + (cls || '') + ' pulse';\n    setTimeout(() => el.classList.remove('pulse'), 500);\n  }\n\n  function clearVar(id) {\n    const el = $(id);\n    el.textContent = '—';\n    el.className = 'var-val';\n  }\n\n  function render() {\n    // Reset all node styles\n    document.querySelectorAll('.node').forEach(n => {\n      n.classList.remove('active','passed','yes','no','skipped');\n    });\n    document.querySelectorAll('.connector').forEach(c => {\n      c.className = 'connector';\n    });\n    document.querySelectorAll('.branch-cell').forEach(b => {\n      b.classList.remove('active','dim');\n    });\n    const v = $('verdict');\n    v.classList.remove('yes','no');\n\n    // Step info\n    const stepNames = [\n      'esperando entrada',\n      'verificación de rangos básicos',\n      'cálculo de año bisiesto',\n      'identificación del tipo de mes',\n      'verificación del día contra el mes',\n      'veredicto final',\n    ];\n    $('step-cur').textContent = state.step;\n    $('step-name').textContent = stepNames[state.step] || '';\n    $('step-prev').disabled = state.step <= 0;\n    $('step-next').disabled = state.step >= 5;\n\n    if (state.step === 0) {\n      $('verdict-text').textContent = '— ingresa una fecha y pulsa validar —';\n      $('verdict-icon').textContent = '·';\n      ['v-dia','v-mes','v-anio','v-bis','v-val'].forEach(clearVar);\n      renderCode(null);\n      return;\n    }\n\n    const r = compute(state.dia, state.mes, state.anio);\n\n    // Always reveal inputs once we start\n    setVar('v-dia',  state.dia,  '');\n    setVar('v-mes',  state.mes,  '');\n    setVar('v-anio', state.anio, '');\n\n    // running fecha_valida: starts true\n    let running = true;\n\n    // STEP 1\n    if (state.step >= 1) {\n      const n = document.querySelector('.node[data-step=\"1\"]');\n      n.classList.add('passed', r.step1_ok ? 'yes' : 'no');\n      if (state.step === 1) n.classList.add('active');\n      if (!r.step1_ok) running = false;\n      setVar('v-val', running, running ? 'true' : 'false');\n    }\n\n    // STEP 2\n    if (state.step >= 2) {\n      const n = document.querySelector('.node[data-step=\"2\"]');\n      n.classList.add('passed', r.es_bisiesto ? 'yes' : 'no');\n      if (state.step === 2) n.classList.add('active');\n      const c1 = $('c1'); c1.classList.add('live');\n      setVar('v-bis', r.es_bisiesto, r.es_bisiesto ? 'true' : 'false');\n    }\n\n    // STEP 3 — branch\n    if (state.step >= 3) {\n      const n = document.querySelector('.node[data-step=\"3\"]');\n      n.classList.add('passed','yes');\n      if (state.step === 3) n.classList.add('active');\n      $('c2').classList.add('live');\n      // highlight the chosen branch, dim others\n      document.querySelectorAll('.branch-cell').forEach(b => {\n        if (b.dataset.branch === r.branch) b.classList.add('active');\n        else b.classList.add('dim');\n      });\n    }\n\n    // STEP 4\n    if (state.step >= 4) {\n      const n = document.querySelector('.node[data-step=\"4\"]');\n      const ok = r.step4_ok !== false;\n      n.classList.add('passed', ok ? 'yes' : 'no');\n      if (state.step === 4) n.classList.add('active');\n      $('c3').classList.add('live');\n\n      // detail text\n      const detail = $('d1');\n      // update step 4 detail to be specific\n      const d4 = document.querySelector('#d4');\n      if (r.maxDay !== null) {\n        d4.textContent = `${r.dia} ≤ ${r.maxDay}   →   ${r.step4_ok ? 'True' : 'False'}`;\n      }\n\n      if (!r.step4_ok && running) running = false;\n      setVar('v-val', running, running ? 'true' : 'false');\n    }\n\n    // STEP 5 — verdict\n    if (state.step >= 5) {\n      const n = document.querySelector('.node[data-step=\"5\"]');\n      n.classList.add('passed', r.fecha_valida ? 'yes' : 'no');\n      if (state.step === 5) n.classList.add('active');\n      $('c4').classList.add('live');\n      v.classList.add(r.fecha_valida ? 'yes' : 'no');\n      $('verdict-text').textContent = r.fecha_valida\n        ? 'La fecha ingresada es válida'\n        : 'La fecha ingresada no es válida';\n      $('verdict-icon').textContent = r.fecha_valida ? '✓' : '✗';\n      setVar('v-val', r.fecha_valida, r.fecha_valida ? 'true' : 'false');\n    }\n\n    // Step-1 detail with live values\n    const d1 = $('d1');\n    if (state.step >= 1) {\n      const inRange = r.step1_ok;\n      d1.textContent = `${r.dia} ∈ [1,31] · ${r.mes} ∈ [1,12]   →   ${inRange ? 'True' : 'False'}`;\n    }\n    // Step-2 detail\n    const d2 = $('d2');\n    if (state.step >= 2) {\n      d2.textContent = `${r.anio} → ${r.es_bisiesto ? 'bisiesto' : 'común'}`;\n    }\n\n    // Sync the code panel\n    renderCode(r);\n  }\n\n  // ─── Code panel sync ───\n  function renderCode(r) {\n    const lines = document.querySelectorAll('#code-block .cl');\n    const tag = $('code-step-tag');\n    const stepShort = [\n      'en espera',\n      'paso 1 · rangos',\n      'paso 2 · bisiesto',\n      'paso 3 · tipo de mes',\n      'paso 4 · días del mes',\n      'paso 5 · veredicto',\n    ];\n    tag.textContent = stepShort[state.step];\n    tag.classList.toggle('live', state.step > 0);\n\n    lines.forEach(line => {\n      line.classList.remove('active-step','passed-step','dim','failed');\n    });\n\n    if (state.step === 0 || !r) return;\n\n    // Determine which lines failed (for visual cue)\n    const failedSteps = new Set();\n    if (!r.step1_ok)         failedSteps.add(1);\n    if (r.step4_ok === false) failedSteps.add(4);\n\n    let activeLine = null;\n    lines.forEach(line => {\n      const s = +line.dataset.step;\n      const b = line.dataset.branch;\n      if (!s) return;\n\n      // Branch-specific lines: dim if not our branch (once we know it)\n      const branchMatches = !b || (r.branch && b === r.branch);\n\n      if (s < state.step) {\n        if (branchMatches) {\n          line.classList.add('passed-step');\n        } else if (b && state.step >= 3) {\n          line.classList.add('dim');\n        }\n      } else if (s === state.step) {\n        if (branchMatches) {\n          line.classList.add('active-step');\n          if (failedSteps.has(s)) line.classList.add('failed');\n          if (!activeLine) activeLine = line;\n        } else if (b) {\n          line.classList.add('dim');\n        }\n      }\n    });\n\n    // Auto-scroll active line into view (within the code-block scroll area)\n    if (activeLine) {\n      const host = $('code-block');\n      const lineTop = activeLine.offsetTop;\n      const lineH   = activeLine.offsetHeight;\n      const hostH   = host.clientHeight;\n      const target  = lineTop - hostH / 2 + lineH / 2;\n      host.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });\n    }\n  }\n\n  // ─── Input handlers ──────────────────────\n  function readInputs() {\n    state.dia  = parseInt($('in-dia').value, 10)  || 0;\n    state.mes  = parseInt($('in-mes').value, 10)  || 0;\n    state.anio = parseInt($('in-anio').value, 10) || 0;\n  }\n  function reset() {\n    readInputs();\n    state.step = 0;\n    render();\n  }\n  function nextStep() {\n    if (state.step === 0) readInputs();\n    if (state.step < 5) state.step += 1;\n    render();\n  }\n  function prevStep() {\n    if (state.step > 0) state.step -= 1;\n    render();\n  }\n\n  // Auto play through all steps\n  async function runAll() {\n    reset();\n    $('btn-run').disabled = true;\n    for (let i = 0; i < 5; i++) {\n      await new Promise(res => setTimeout(res, 650));\n      nextStep();\n    }\n    $('btn-run').disabled = false;\n  }\n\n  $('btn-run').onclick   = runAll;\n  $('btn-reset').onclick = reset;\n  $('step-next').onclick = nextStep;\n  $('step-prev').onclick = prevStep;\n\n  ['in-dia','in-mes','in-anio'].forEach(id => {\n    $(id).addEventListener('input', reset);\n  });\n\n  // Keyboard nav\n  document.addEventListener('keydown', (e) => {\n    if (e.target.tagName === 'INPUT') return;\n    if (e.key === 'ArrowRight') nextStep();\n    if (e.key === 'ArrowLeft')  prevStep();\n    if (e.key === 'Enter')      runAll();\n    if (e.key === 'Escape')     reset();\n  });\n\n  // initial\n  reset();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
